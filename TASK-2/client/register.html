<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Create account · MiniSocial</title><link rel="stylesheet" href="css/styles.css"></head><body class="auth-page"><main class="card auth-card"><a class="brand" href="login.html">mini<span>social</span></a><h1>Create your account</h1><div class="alert"></div><form data-endpoint="/auth/register"><label>Full name<input name="fullName" required maxlength="80"></label><label>Username<input name="username" required minlength="3" maxlength="30" pattern="[A-Za-z0-9_]+"></label><label>Email<input name="email" type="email" required></label><label>Password<input name="password" type="password" required minlength="8"></label><label>Confirm password<input name="confirmPassword" type="password" required minlength="8"></label><div class="form-actions"><button class="button">Create account</button></div></form><p class="subtle">Already registered? <a href="login.html">Sign in</a></p></main><script src="js/api.js"></script><script src="js/auth.js"></script></body></html>
