<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Product · Northstar</title><link rel="stylesheet" href="styles.css"></head><body><header><a class="logo" href="index.html">north<span>star</span></a><a href="index.html">← Back to shop</a></header><main class="catalog"><section id="detail" class="card empty">Loading product…</section></main><script>const id=new URLSearchParams(location.search).get('id');fetch('/api/products/'+id).then(r=>r.json()).then(p=>{document.title=p.name+' · Northstar';document.querySelector('#detail').className='card';document.querySelector('#detail').innerHTML=`<div class="product-art">${({Bags:'◫',Home:'⌂',Stationery:'✎',Clothing:'♧',Accessories:'◌'}[p.category]||'○')}</div><h1>${p.name}</h1><p>${p.description}</p><p><b>$${p.price.toFixed(2)}</b> · ${p.stock} in stock</p><button class="primary" id="add">Add to cart</button>`;document.querySelector('#add').onclick=()=>{const c=JSON.parse(localStorage.cart||'[]'),x=c.find(x=>x.productId===p._id);if(x)x.quantity++;else c.push({productId:p._id,name:p.name,price:p.price,quantity:1});localStorage.cart=JSON.stringify(c);location='index.html'}}).catch(()=>document.querySelector('#detail').textContent='Product not found.');</script></body></html>
